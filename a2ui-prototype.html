<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2UI Vision Generator — HMI Prototype</title>
<style>
:root {
  --bg-deep: #0a0c12;
  --bg-panel: #11161f;
  --bg-card: rgba(18, 24, 38, 0.75);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-hover: rgba(255,255,255,0.15);
  --neon-cyan: #00e5ff;
  --neon-blue: #448aff;
  --tag-green-bg: rgba(0,200,120,0.15);
  --tag-green-border: rgba(0,200,120,0.4);
  --tag-green-text: #00e676;
  --tag-red-bg: rgba(255,60,60,0.15);
  --tag-red-border: rgba(255,60,60,0.4);
  --tag-red-text: #ff5252;
  --star-gold: #ffc107;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0a6;
  --text-muted: #5f6368;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: radial-gradient(ellipse at 50% 30%, #141c2b 0%, #0a0d14 60%, #05070a 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow:hidden;
  user-select:none;
}

.ambient-glow-top {
  position:fixed; top:-200px; left:50%; transform:translateX(-50%);
  width:900px; height:400px;
  background:radial-gradient(ellipse, rgba(0,180,255,0.08) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
.ambient-glow-bottom {
  position:fixed; bottom:-150px; left:50%; transform:translateX(-50%);
  width:800px; height:300px;
  background:radial-gradient(ellipse, rgba(0,229,255,0.06) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

.dashboard {
  position:relative; z-index:1;
  width:min(1280px, 96vw);
  display:flex; flex-direction:column; gap:24px;
}

.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 8px;
}

.header-brand {
  display:flex; align-items:center; gap:12px;
}
.header-logo {
  width:38px; height:38px;
  border-radius:10px;
  background:linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.header-logo svg {
  width:22px; height:22px;
}
.header-title {
  font-size:15px; font-weight:600; color:var(--text-primary);
  letter-spacing:1px;
}
.header-subtitle {
  font-size:11px; color:var(--text-muted);
  letter-spacing:2px; text-transform:uppercase;
}

.status-indicator {
  display:flex; align-items:center; gap:8px;
  font-size:12px; color:var(--text-secondary);
}
.status-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--neon-cyan);
  box-shadow: 0 0 8px var(--neon-cyan), 0 0 16px rgba(0,229,255,0.4);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

.screen-frame {
  position:relative;
  background: linear-gradient(160deg, #1a1f2e 0%, #0f131c 100%);
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.08);
  padding:4px;
  box-shadow:
    0 0 40px rgba(0,150,255,0.06),
    inset 0 1px 0 rgba(255,255,255,0.03),
    0 20px 60px rgba(0,0,0,0.5);
}

.screen-frame::before {
  content:'';
  position:absolute; inset:0; border-radius:24px;
  background:linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 40%);
  pointer-events:none; z-index:2;
}

.screen-content {
  position:relative; z-index:1;
  background:var(--bg-panel);
  border-radius:20px;
  padding:28px 28px 24px;
  min-height:420px;
}

.screen-top-bar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:22px;
}
.screen-title {
  font-size:14px; font-weight:600; color:var(--text-primary);
  letter-spacing:0.5px;
}
.screen-meta {
  display:flex; gap:16px;
  font-size:11px; color:var(--text-muted);
}
.screen-meta span { display:flex; align-items:center; gap:4px; }

.cards-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:18px;
}

.card {
  background:var(--bg-card);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:16px;
  border:1px solid var(--glass-border);
  overflow:hidden;
  transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  position:relative;
}
.card::after {
  content:'';
  position:absolute; inset:0; border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 50%);
  pointer-events:none;
}
.card:hover {
  border-color:var(--glass-border-hover);
  transform:translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.card-image {
  width:100%; height:130px;
  position:relative; overflow:hidden;
}
.card-image-placeholder {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-size:48px;
  position:relative;
}
.card-image-bg {
  position:absolute; inset:0;
  opacity:0.7;
}
.card-image-overlay {
  position:absolute; bottom:0; left:0; right:0; height:50%;
  background:linear-gradient(transparent, rgba(0,0,0,0.6));
}

.card-body {
  padding:14px 16px 16px;
}

.card-name {
  font-size:16px; font-weight:600; color:var(--text-primary);
  margin-bottom:8px; letter-spacing:0.5px;
}

.card-rating-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
}
.card-stars {
  display:flex; gap:2px;
}
.star { color:var(--star-gold); font-size:13px; }
.star-empty { color:var(--text-muted); opacity:0.4; font-size:13px; }
.card-price {
  font-size:12px; color:var(--text-secondary);
  background:rgba(255,255,255,0.05);
  padding:3px 10px; border-radius:20px;
  border:0.5px solid rgba(255,255,255,0.1);
}

.card-tags { display:flex; flex-direction:column; gap:6px; }

.tag-row {
  display:flex; flex-wrap:wrap; gap:5px;
}
.tag {
  font-size:11px; padding:3px 10px;
  border-radius:20px;
  font-weight:500;
  letter-spacing:0.3px;
  transition: all 0.2s;
}
.tag-pro {
  background:var(--tag-green-bg);
  border:0.5px solid var(--tag-green-border);
  color:var(--tag-green-text);
}
.tag-con {
  background:var(--tag-red-bg);
  border:0.5px solid var(--tag-red-border);
  color:var(--tag-red-text);
}
.tag-label {
  font-size:9px; text-transform:uppercase; letter-spacing:1px;
  opacity:0.6; margin-bottom:1px;
}

.control-bar {
  display:flex; align-items:center; gap:14px;
  background: var(--bg-panel);
  border-radius:16px;
  padding:12px 18px;
  border:1px solid var(--glass-border);
}

.query-display {
  flex:1;
  display:flex; align-items:center; gap:10px;
  min-width:0;
}
.query-icon {
  font-size:18px; flex-shrink:0;
  color:var(--neon-cyan);
  animation: pulse-dot 3s ease-in-out infinite;
}
.query-text {
  font-size:30px; font-weight:800;
  background: linear-gradient(90deg, #00e5ff 0%, #82b1ff 30%, #ea80fc 70%, #00e5ff 100%);
  background-size:200% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  min-height:28px;
  letter-spacing:0.5px;
  text-shadow: 0 0 0 transparent;
  animation: textShimmer 4s linear infinite;
  filter: drop-shadow(0 0 12px rgba(0,229,255,0.25));
}
@keyframes textShimmer {
  0% { background-position:0% center; }
  100% { background-position:200% center; }
}
.query-text.placeholder {
  background: transparent;
  -webkit-text-fill-color:var(--text-muted);
  color:var(--text-muted);
  font-weight:400;
  font-style:italic;
  filter: none;
  animation: none;
}

.voice-btn {
  display:flex; align-items:center; gap:8px;
  padding:10px 22px;
  border-radius:28px;
  border:1px solid var(--neon-cyan);
  background:rgba(0,229,255,0.08);
  color:var(--neon-cyan);
  font-size:13px; font-weight:600;
  cursor:pointer;
  letter-spacing:0.5px;
  transition: all 0.3s;
  white-space:nowrap;
  flex-shrink:0;
}
.voice-btn:hover {
  background:rgba(0,229,255,0.18);
  box-shadow: 0 0 20px rgba(0,229,255,0.2);
  transform:scale(1.03);
}
.voice-btn:active {
  transform:scale(0.97);
  transition:transform 0.1s;
}
.voice-btn-icon {
  font-size:16px;
}

.card-enter {
  animation: cardSlideIn 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
}
@keyframes cardSlideIn {
  from { opacity:0; transform:translateY(16px) scale(0.96); }
  to { opacity:1; transform:translateY(0) scale(1); }
}
.card:nth-child(1) { animation-delay:0s; }
.card:nth-child(2) { animation-delay:0.08s; }
.card:nth-child(3) { animation-delay:0.16s; }

.query-flash { animation:queryFlash 0.6s ease-out; }
@keyframes queryFlash {
  0% { color:var(--neon-cyan); }
  100% { color:var(--text-primary); }
}

.scan-line {
  position:absolute; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(0,229,255,0.3), transparent);
  animation: scanDown 3s linear infinite;
  pointer-events:none; z-index:3; opacity:0.5;
}
@keyframes scanDown {
  0% { top:0; }
  100% { top:100%; }
}
</style>
</head>

];

function renderStars(rating) {
  const full = Math.floor(rating);
  const hasHalf = rating - full >= 0.3;
  let html = '';
  for (let i = 0; i < 5; i++) {
    if (i < full) html += '<span class="star">★</span>';
    else if (i === full && hasHalf) html += '<span class="star">★</span>';
    else html += '<span class="star-empty">★</span>';
  }
  return html + ` <span style="font-size:12px;color:var(--star-gold);margin-left:2px;">${rating}</span>`;
}

function renderTags(tags, cls) {
  return tags.map(t => `<span class="tag ${cls}">${t}</span>`).join('');
}

let currentScenarioIndex = -1;

function updateCards(scenario) {
  const cards = document.getElementById('cardsGrid');
  cards.querySelectorAll('.card').forEach(c => c.classList.remove('card-enter'));
  void cards.offsetWidth;
  cards.querySelectorAll('.card').forEach(c => c.classList.add('card-enter'));

  scenario.candidates.forEach((c, i) => {
    const idx = i + 1;
    document.getElementById('cardBg'+idx).style.background = c.visualBg;
    document.getElementById('cardEmoji'+idx).textContent = c.emoji;
    document.getElementById('cardName'+idx).textContent = c.name;
    document.getElementById('cardStars'+idx).innerHTML = renderStars(c.rating);
    document.getElementById('cardPrice'+idx).textContent = c.price;
    document.getElementById('cardPros'+idx).innerHTML = renderTags(c.pros, 'tag-pro');
    document.getElementById('cardCons'+idx).innerHTML = renderTags(c.cons, 'tag-con');
  });
}

function generateRandomQuery() {
  let idx;
  do { idx = Math.floor(Math.random() * SCENARIO_DATA.length); }
  while (idx === currentScenarioIndex && SCENARIO_DATA.length > 1);
  currentScenarioIndex = idx;

  const scenario = SCENARIO_DATA[idx];
  const queryEl = document.getElementById('queryText');
  queryEl.textContent = scenario.query;
  queryEl.classList.remove('placeholder');
  queryEl.classList.add('query-flash');
  setTimeout(() => queryEl.classList.remove('query-flash'), 600);

  const btn = document.getElementById('voiceBtn');
  btn.style.pointerEvents = 'none';
  btn.style.opacity = '0.6';

  setTimeout(() => {
    updateCards(scenario);
    btn.style.pointerEvents = 'auto';
    btn.style.opacity = '1';
  }, 300);
}

function updateTime() {
  const now = new Date();
  document.getElementById('timeDisplay').textContent =
    now.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
}

updateTime();
setInterval(updateTime, 30000);

window.addEventListener('load', () => {
  const initScenario = SCENARIO_DATA[0];
  updateCards(initScenario);
});
</script>
